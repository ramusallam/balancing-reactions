<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Balancing Reactions</title>
  <style>
    :root {
      --bg-0: #0f172a;          /* slate-900, cleaner than pure black */
      --bg-1: #1e293b;          /* slate-800 — cards */
      --bg-2: #273548;          /* slate-700 — inset */
      --ink-hi: #f8fafc;        /* crisp white */
      --ink-mid: #cbd5e1;       /* slate-300 */
      --ink-low: #94a3b8;       /* slate-400 */
      --border: rgba(148, 163, 184, 0.28);
      --border-strong: rgba(148, 163, 184, 0.55);

      /* mode accents */
      --accent: #818cf8;        /* indigo-400 — progressing */
      --accent-hover: #a5b4fc;
      --accent-soft: rgba(129, 140, 248, 0.14);
      --accent-ring: rgba(129, 140, 248, 0.4);

      --success: #34d399;       /* emerald-400 */
      --error:   #f87171;       /* red-400 */
    }
    body[data-mode="training"] {
      --accent: #fbbf24;        /* amber-400 */
      --accent-hover: #fcd34d;
      --accent-soft: rgba(251, 191, 36, 0.14);
      --accent-ring: rgba(251, 191, 36, 0.4);
    }
    body[data-mode="sandbox"] {
      --accent: #c4b5fd;        /* violet-300 */
      --accent-hover: #ddd6fe;
      --accent-soft: rgba(196, 181, 253, 0.14);
      --accent-ring: rgba(196, 181, 253, 0.4);
    }
    body[data-mode="custom"] {
      --accent: #2dd4bf;        /* teal-400 — practice mode */
      --accent-hover: #5eead4;
      --accent-soft: rgba(45, 212, 191, 0.14);
      --accent-ring: rgba(45, 212, 191, 0.4);
    }

    /* Practice-mode input form: big, inviting, minimal. */
    .custom-form {
      background: var(--bg-1);
      border: 2px solid var(--accent);
      border-radius: 14px;
      padding: 32px 28px;
      text-align: center;
    }
    .custom-form h2 {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 8px;
      letter-spacing: -0.01em;
    }
    .custom-form p {
      color: var(--ink-mid);
      font-size: 14px;
      margin-bottom: 22px;
    }
    .custom-input {
      width: 100%;
      font-family: ui-serif, Georgia, serif;
      font-size: clamp(20px, 3.2vw, 28px);
      font-weight: 600;
      padding: 16px 20px;
      background: var(--bg-2);
      border: 2px solid var(--border-strong);
      border-radius: 10px;
      color: var(--ink-hi);
      text-align: center;
      outline: none;
      transition: border-color 120ms ease, background 120ms ease;
    }
    .custom-input:focus {
      border-color: var(--accent);
      background: var(--bg-1);
    }
    .custom-input::placeholder { color: var(--ink-low); font-style: italic; font-weight: 400; }
    .custom-examples {
      margin-top: 14px;
      color: var(--ink-low);
      font-size: 13px;
      line-height: 1.7;
    }
    .custom-examples code {
      font-family: ui-monospace, monospace;
      background: var(--bg-2);
      padding: 2px 8px;
      border-radius: 5px;
      color: var(--ink-mid);
    }
    .custom-error {
      margin-top: 14px;
      color: var(--error);
      font-size: 14px;
      min-height: 20px;
    }
    .custom-actions {
      margin-top: 20px;
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { min-height: 100vh; }
    body {
      font-family: system-ui, -apple-system, "SF Pro Text", "Segoe UI", sans-serif;
      background: var(--bg-0);
      color: var(--ink-hi);
      line-height: 1.45;
      font-size: 16px;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    /* Layout */
    .shell { max-width: 960px; margin: 0 auto; padding: 24px 28px; }

    /* Top row: mode badge + tier ladder + action buttons */
    .topbar {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 18px;
      flex-wrap: wrap;
    }
    .mode-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--accent);
      color: #0f172a;
      padding: 7px 16px;
      border-radius: 999px;
      font-weight: 800;
      font-size: 12px;
      letter-spacing: 1.2px;
      text-transform: uppercase;
    }
    .actions-right { margin-left: auto; display: flex; gap: 8px; }

    .btn {
      border-radius: 8px;
      padding: 9px 16px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      border: 1px solid var(--border-strong);
      background: var(--bg-1);
      color: var(--ink-hi);
      font-family: inherit;
      transition: background 120ms ease, border-color 120ms ease;
    }
    .btn:hover { background: var(--bg-2); border-color: var(--ink-low); }
    .btn.primary {
      background: var(--accent);
      color: #0f172a;
      border-color: var(--accent);
    }
    .btn.primary:hover { background: var(--accent-hover); border-color: var(--accent-hover); }

    /* Tier ladder — visual only */
    .ladder { display: flex; gap: 6px; margin-bottom: 20px; }
    .tier-pill {
      flex: 1;
      padding: 10px 14px;
      background: var(--bg-1);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      text-align: center;
      min-width: 0;
      transition: border-color 200ms ease, background 200ms ease;
    }
    .tier-pill .tier-idx {
      display: block;
      font-size: 11px;
      letter-spacing: 1.5px;
      color: var(--ink-low);
      font-weight: 700;
    }
    .tier-pill .tier-name {
      font-size: 15px;
      font-weight: 700;
      margin-top: 2px;
      color: var(--ink-mid);
    }
    .tier-pill.done {
      background: rgba(52, 211, 153, 0.08);
      border-color: rgba(52, 211, 153, 0.5);
    }
    .tier-pill.done .tier-idx, .tier-pill.done .tier-name { color: var(--success); }
    .tier-pill.now {
      background: var(--accent-soft);
      border-color: var(--accent);
    }
    .tier-pill.now .tier-idx, .tier-pill.now .tier-name { color: var(--accent); }
    .tier-pill.drill {
      border-style: dashed;
      border-color: #fbbf24;
      background: rgba(251, 191, 36, 0.06);
    }
    .tier-pill.drill .tier-idx, .tier-pill.drill .tier-name { color: #fbbf24; }

    /* Streak dots */
    .streak {
      display: flex;
      justify-content: flex-end;
      gap: 6px;
      margin-bottom: 18px;
    }
    .streak-dot {
      width: 12px; height: 12px; border-radius: 50%;
      background: var(--bg-2);
      border: 1.5px solid var(--border-strong);
    }
    .streak-dot.filled { background: var(--accent); border-color: var(--accent); }
    .streak-dot.active { box-shadow: 0 0 0 3px var(--accent-ring); border-color: var(--accent); }

    /* Card */
    .card {
      background: var(--bg-1);
      border: 1.5px solid var(--border);
      border-radius: 14px;
      padding: 26px;
      transition: border-color 200ms ease;
    }
    body[data-mode="training"] .card { border-color: var(--accent); }

    /* Timer row — giant, inside the card */
    .timer-row {
      display: none;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: 14px 20px;
      background: var(--bg-2);
      border: 2px solid var(--accent);
      border-radius: 12px;
      margin-bottom: 18px;
    }
    .timer-row.show { display: flex; }
    .timer-row.urgent { border-color: var(--error); background: rgba(248, 113, 113, 0.10); }
    .whisper {
      flex: 1;
      text-align: center;
      font-style: italic;
      font-size: 14px;
      color: var(--ink-low);
      opacity: 0;
      transition: opacity 550ms ease;
      pointer-events: none;
      font-family: Georgia, ui-serif, serif;
      letter-spacing: 0.3px;
    }
    .whisper.show { opacity: 0.9; }
    .timer-row.urgent .whisper { color: var(--error); }
    .timer-label {
      font-size: 12px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--ink-low);
      font-weight: 700;
    }
    .timer-value {
      font-size: 40px;
      font-weight: 800;
      font-variant-numeric: tabular-nums;
      color: var(--accent);
      letter-spacing: 2px;
      line-height: 1;
    }
    .timer-value.urgent { color: var(--error); animation: blink 0.6s infinite; }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

    /* Start overlay — replaces action row until clicked */
    .start-box {
      display: block;
      text-align: center;
      padding: 36px 20px;
      background: var(--accent-soft);
      border: 2px dashed var(--accent);
      border-radius: 12px;
      margin-bottom: 18px;
    }
    .start-box.hidden { display: none; }
    .btn-start {
      background: var(--accent);
      color: #0f172a;
      border: none;
      border-radius: 10px;
      padding: 18px 56px;
      font-size: 22px;
      font-weight: 800;
      letter-spacing: 1px;
      text-transform: uppercase;
      cursor: pointer;
      box-shadow: 0 4px 14px var(--accent-ring);
      transition: transform 120ms ease, background 120ms ease;
      font-family: inherit;
    }
    .btn-start:hover { background: var(--accent-hover); transform: translateY(-1px); }
    .start-sub {
      color: var(--ink-mid);
      font-size: 13px;
      margin-top: 12px;
      letter-spacing: 0.3px;
    }

    /* Equation */
    .eq {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
      gap: 18px;
      padding: 28px 12px;
      background: var(--bg-2);
      border-radius: 12px;
      margin-bottom: 20px;
    }
    .eq.locked { opacity: 0.35; pointer-events: none; filter: grayscale(0.4); }
    .mol { display: flex; flex-direction: column; align-items: center; gap: 6px; }
    .step {
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .step-btn {
      width: 46px; height: 32px;
      background: var(--bg-1);
      border: 1.5px solid var(--border-strong);
      border-radius: 6px;
      color: var(--ink-hi);
      font-weight: 800;
      font-size: 16px;
      cursor: pointer;
      transition: background 120ms ease, border-color 120ms ease;
    }
    .step-btn:hover { background: var(--accent); color: #0f172a; border-color: var(--accent); }
    .coeff {
      font-size: 30px;
      font-weight: 800;
      color: var(--accent);
      font-variant-numeric: tabular-nums;
      min-width: 38px;
      text-align: center;
      line-height: 1.1;
      margin: 2px 0;
    }
    .formula {
      font-family: ui-serif, "Times New Roman", Georgia, serif;
      font-size: 1.55rem;
      font-weight: 600;
      color: var(--ink-hi);
    }
    .formula sub { font-size: 0.68em; vertical-align: baseline; }
    .op {
      color: var(--ink-low);
      font-size: 1.6rem;
      font-weight: 300;
    }

    /* Action row (Check/Reset) */
    .actions {
      display: none;
      gap: 10px;
      flex-wrap: wrap;
    }
    .actions.show { display: flex; }
    .actions .btn.primary { padding: 14px 36px; font-size: 17px; }

    /* Toast / status */
    .toast {
      margin-bottom: 14px;
      padding: 12px 16px;
      border-radius: 10px;
      font-size: 14px;
      line-height: 1.5;
      background: var(--bg-1);
      border: 1.5px solid var(--border);
      color: var(--ink-mid);
      display: none;
    }
    .toast.show { display: block; }
    .toast.good { background: rgba(52, 211, 153, 0.08); border-color: var(--success); color: #a7f3d0; }
    .toast.bad  { background: rgba(248, 113, 113, 0.08); border-color: var(--error); color: #fecaca; }
    .toast.amber { background: rgba(251, 191, 36, 0.08); border-color: #fbbf24; color: #fde68a; }
    .toast b { color: var(--ink-hi); }

    /* Correct-answer reveal overlay — fires on a wrong submission in
       progressing mode, shows the balanced equation for a few seconds,
       then drops the student into training. */
    .reveal {
      position: fixed; inset: 0;
      display: flex; align-items: center; justify-content: center;
      background: rgba(15, 23, 42, 0.88);
      opacity: 0; pointer-events: none;
      transition: opacity 220ms ease;
      z-index: 99;
      padding: 20px;
    }
    .reveal.show { opacity: 1; }
    .reveal-inner {
      text-align: center;
      padding: 28px 36px;
      background: var(--bg-1);
      border: 2px solid #fbbf24;
      border-radius: 14px;
      max-width: 720px;
    }
    .reveal-label {
      font-size: 12px;
      letter-spacing: 2px;
      color: #fbbf24;
      font-weight: 800;
      margin-bottom: 14px;
    }
    .reveal-eq {
      font-family: ui-serif, Georgia, serif;
      font-size: clamp(24px, 4vw, 38px);
      font-weight: 600;
      color: var(--ink-hi);
      margin-bottom: 14px;
      line-height: 1.2;
    }
    .reveal-eq .co { color: #fbbf24; font-weight: 900; margin-right: 2px; }
    .reveal-eq sub { font-size: 0.68em; vertical-align: baseline; }
    .reveal-sub {
      font-size: 14px;
      color: var(--ink-mid);
      font-style: italic;
    }

    /* Big centered praise popup — visual fallback if speech is blocked,
       but also a great amp-up even when speech works. */
    .praise {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      opacity: 0;
      transition: opacity 180ms ease, transform 220ms ease;
      transform: scale(0.8);
      z-index: 100;
    }
    .praise.show { opacity: 1; transform: scale(1); }
    .praise span {
      font-size: clamp(48px, 10vw, 120px);
      font-weight: 900;
      letter-spacing: -0.03em;
      color: var(--success);
      text-shadow: 0 0 40px rgba(52, 211, 153, 0.5);
      padding: 20px 40px;
    }

    @media (max-width: 640px) {
      .shell { padding: 16px; }
      .formula { font-size: 1.2rem; }
      .eq { font-size: 1rem; gap: 10px; padding: 18px 6px; }
      .timer-value { font-size: 32px; }
      .btn-start { padding: 14px 36px; font-size: 18px; }
      .coeff { font-size: 24px; }
    }
  </style>
</head>
<body data-mode="progressing">

<div class="reveal" id="reveal">
  <div class="reveal-inner">
    <div class="reveal-label">Correct balance</div>
    <div class="reveal-eq" id="reveal-eq"></div>
    <div class="reveal-sub" id="reveal-sub">Heading to training…</div>
  </div>
</div>

<div class="praise" id="praise"><span id="praise-text"></span></div>

<div class="shell">

  <div class="topbar">
    <span class="mode-badge" id="mode-badge">Progressing</span>
    <span class="mode-badge" id="mode-icon" style="background:transparent;color:var(--accent);border:1.5px solid var(--accent);padding:6px 12px">Tier 1</span>
    <div class="actions-right">
      <button class="btn" id="practice-btn">Practice</button>
      <button class="btn" id="sandbox-btn" style="display:none">Sandbox</button>
      <button class="btn" id="reset-btn">Start over</button>
    </div>
  </div>

  <div class="ladder" id="ladder"></div>
  <div class="streak" id="streak"></div>

  <div class="toast" id="toast"></div>

  <div class="custom-form" id="custom-form" style="display:none">
    <h2>Type a reaction to practice</h2>
    <p>Whatever you're doing in class — paste it in and balance it.</p>
    <input class="custom-input" id="custom-input" placeholder="Na + Cl2 → NaCl" autocomplete="off" spellcheck="false" />
    <div class="custom-examples">
      Use <code>-&gt;</code> or <code>→</code> for the arrow. Examples: <code>H2 + O2 → H2O</code>, <code>CH4 + O2 → CO2 + H2O</code>, <code>Fe + Cl2 → FeCl3</code>
    </div>
    <div class="custom-error" id="custom-error"></div>
    <div class="custom-actions">
      <button class="btn primary" id="custom-build-btn">Build it</button>
      <button class="btn" id="custom-exit-btn">Exit practice</button>
    </div>
  </div>

  <div class="card" id="main-card">

    <div class="timer-row" id="timer-row">
      <span class="timer-label">Time</span>
      <span class="whisper" id="whisper"></span>
      <span class="timer-value" id="timer-value">2:00</span>
    </div>

    <div class="start-box" id="start-box">
      <button class="btn-start" id="start-btn">Start</button>
      <div class="start-sub" id="start-sub">Tap to start. The 2-minute timer begins.</div>
    </div>

    <div class="eq locked" id="eq"></div>

    <div class="actions" id="actions">
      <button class="btn primary" id="check-btn">Check</button>
      <button class="btn" id="reset-coeffs-btn">Reset coefficients</button>
    </div>

  </div>

</div>

<script>
/* ============================================================
   Balancing Reactions — mastery mode, minimal UI
   ============================================================ */

const TRAINING_TO_EXIT = 2;
const PROBLEM_TIME_LIMIT = 120;
const URGENT_TIME = 20;

/* Every problem now carries its `answer` (balanced coefficients) so we
   can reveal the correct balance when a student misses. Pools expanded
   to give each tier a real bench — ~27 progressing and ~27 training
   per tier, plus a sandbox of 14. No problem is trivially balanced at
   [1,1,...]; every one requires at least one coefficient > 1. */
const TIERS = [
  {
    id: 'tier1', label: 'Tier 1', name: 'Warm-up', toAdvance: 3,
    progressing: [
      { eq: 'H2 + O2 -> H2O',      name: 'Water Synthesis',            answer: [2,1,2] },
      { eq: 'N2 + H2 -> NH3',      name: 'Haber Process',              answer: [1,3,2] },
      { eq: 'Na + Cl2 -> NaCl',    name: 'Table Salt',                 answer: [2,1,2] },
      { eq: 'H2 + Cl2 -> HCl',     name: 'Hydrogen Chloride',          answer: [1,1,2] },
      { eq: 'Mg + O2 -> MgO',      name: 'Magnesium Burns',            answer: [2,1,2] },
      { eq: 'K + Cl2 -> KCl',      name: 'Potassium Chloride',         answer: [2,1,2] },
      { eq: 'Li + O2 -> Li2O',     name: 'Lithium Oxide',              answer: [4,1,2] },
      { eq: 'Ca + O2 -> CaO',      name: 'Calcium Oxide',              answer: [2,1,2] },
      { eq: 'N2 + O2 -> NO',       name: 'Nitric Oxide',               answer: [1,1,2] },
      { eq: 'Ag + S -> Ag2S',      name: 'Silver Sulfide',             answer: [2,1,1] },
      { eq: 'P + O2 -> P2O5',      name: 'Phosphorus Pentoxide',       answer: [4,5,2] },
      { eq: 'Cu + S -> Cu2S',      name: 'Copper(I) Sulfide',          answer: [2,1,1] },
      { eq: 'K + Br2 -> KBr',      name: 'Potassium Bromide',          answer: [2,1,2] },
      { eq: 'Zn + O2 -> ZnO',      name: 'Zinc Oxide',                 answer: [2,1,2] },
      { eq: 'Al + Cl2 -> AlCl3',   name: 'Aluminum Chloride',          answer: [2,3,2] },
      { eq: 'H2 + F2 -> HF',       name: 'Hydrogen Fluoride',          answer: [1,1,2] },
      { eq: 'H2O -> H2 + O2',      name: 'Electrolysis',               answer: [2,2,1] },
      { eq: 'Na + O2 -> Na2O',     name: 'Sodium Oxide',               answer: [4,1,2] },
      { eq: 'Mg + N2 -> Mg3N2',    name: 'Magnesium Nitride',          answer: [3,1,1] },
      { eq: 'Fe + O2 -> FeO',      name: 'Iron(II) Oxide',             answer: [2,1,2] },
      { eq: 'Li + Cl2 -> LiCl',    name: 'Lithium Chloride',           answer: [2,1,2] },
      { eq: 'K + I2 -> KI',        name: 'Potassium Iodide',           answer: [2,1,2] },
      { eq: 'Cs + Cl2 -> CsCl',    name: 'Cesium Chloride',            answer: [2,1,2] },
      { eq: 'Ca + N2 -> Ca3N2',    name: 'Calcium Nitride',            answer: [3,1,1] },
      { eq: 'V + O2 -> V2O5',      name: 'Vanadium Pentoxide',         answer: [4,5,2] },
      { eq: 'W + O2 -> WO3',       name: 'Tungsten Trioxide',          answer: [2,3,2] },
      { eq: 'Sb + Cl2 -> SbCl3',   name: 'Antimony Trichloride',       answer: [2,3,2] },
    ],
    training: [
      { eq: 'Sr + O2 -> SrO',      name: 'Strontium Oxide',            answer: [2,1,2] },
      { eq: 'Cs + Br2 -> CsBr',    name: 'Cesium Bromide',             answer: [2,1,2] },
      { eq: 'Be + O2 -> BeO',      name: 'Beryllium Oxide',            answer: [2,1,2] },
      { eq: 'Ni + O2 -> NiO',      name: 'Nickel(II) Oxide',           answer: [2,1,2] },
      { eq: 'Na + F2 -> NaF',      name: 'Sodium Fluoride',            answer: [2,1,2] },
      { eq: 'H2 + I2 -> HI',       name: 'Hydrogen Iodide',            answer: [1,1,2] },
      { eq: 'K + O2 -> K2O',       name: 'Potassium Oxide',            answer: [4,1,2] },
      { eq: 'Rb + Cl2 -> RbCl',    name: 'Rubidium Chloride',          answer: [2,1,2] },
      { eq: 'Al + Br2 -> AlBr3',   name: 'Aluminum Bromide',           answer: [2,3,2] },
      { eq: 'Cd + O2 -> CdO',      name: 'Cadmium Oxide',              answer: [2,1,2] },
      { eq: 'Hg + O2 -> HgO',      name: 'Mercury(II) Oxide',          answer: [2,1,2] },
      { eq: 'Fe + Cl2 -> FeCl3',   name: 'Iron(III) Chloride',         answer: [2,3,2] },
      { eq: 'Li + H2 -> LiH',      name: 'Lithium Hydride',            answer: [2,1,2] },
      { eq: 'Cs + O2 -> Cs2O',     name: 'Cesium Oxide',               answer: [4,1,2] },
      { eq: 'Rb + O2 -> Rb2O',     name: 'Rubidium Oxide',             answer: [4,1,2] },
      { eq: 'Ag + O2 -> Ag2O',     name: 'Silver(I) Oxide',            answer: [4,1,2] },

/* Format a balanced equation for the reveal overlay — e.g.
   "2 H<sub>2</sub> + O<sub>2</sub> → 2 H<sub>2</sub>O", with the
   coefficients highlighted in amber. */
function formatBalancedHTML(problem) {
  const { reactants, products } = splitEq(problem.eq);
  const coeffs = problem.answer || [];
  const sideHTML = (arr, off) => arr.map((f, i) => {
    const c = coeffs[i + off] || 1;
    const cTag = c > 1 ? `<span class="co">${c}</span> ` : '';
    return cTag + f.replace(/(\d+)/g, '<sub>$1</sub>');
  }).join(' + ');
  return sideHTML(reactants, 0) + ' → ' + sideHTML(products, reactants.length);
}
function showCorrectAnswer(problem, durationMs = 3500) {
  $('reveal-eq').innerHTML = formatBalancedHTML(problem);
  $('reveal').classList.add('show');
  setTimeout(() => $('reveal').classList.remove('show'), durationMs);
}

/* When returning to progressing after training, reshuffle the queue
   AND push the most recently failed problem to the end — so students
   can't just memorize that one equation. */
function reshuffleProgAvoidLast() {
  const tier = TIERS[state.progTier];
  let order = shuffle(Array.from({length: tier.progressing.length}, (_, i) => i));
  if (state.lastFailedEq) {
    const failedIdx = tier.progressing.findIndex(p => p.eq === state.lastFailedEq);
    if (failedIdx >= 0) {
      order = order.filter(i => i !== failedIdx);
      order.push(failedIdx);
    }
  }
  state.queues.prog[state.progTier] = order;
}

function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function currentPool() {
  if (state.mode === 'custom') return state.customProblem ? [state.customProblem] : [];
  if (state.mode === 'sandbox') return SANDBOX.problems;
  if (state.mode === 'training') return TIERS[state.trainTier].training;
  return TIERS[state.progTier].progressing;
}

function currentTierIdx() {
  return state.mode === 'training' ? state.trainTier : state.progTier;
}

function refillQueue() {
  const pool = currentPool();
  const order = shuffle(Array.from({length: pool.length}, (_, i) => i));
  if (state.mode === 'sandbox') { state.queues.sand = order; return; }
  if (state.mode === 'training') { state.queues.train[state.trainTier] = order; return; }
  state.queues.prog[state.progTier] = order;
}

function currentQueue() {
  if (state.mode === 'sandbox') return state.queues.sand;
  if (state.mode === 'training') return state.queues.train[state.trainTier];
  return state.queues.prog[state.progTier];
}

function refillAll() {
  // Refill every possible queue so the bank always feels fresh on restart
  TIERS.forEach((_, i) => {
    state.queues.prog[i] = shuffle(Array.from({length: TIERS[i].progressing.length}, (_, k) => k));
    state.queues.train[i] = shuffle(Array.from({length: TIERS[i].training.length}, (_, k) => k));
  });
  state.queues.sand = shuffle(Array.from({length: SANDBOX.problems.length}, (_, k) => k));
}

function pickNext() {
  let q = currentQueue();
  if (!q || q.length === 0) { refillQueue(); q = currentQueue(); }
  state.problemIdx = q.shift();
}

/* ============================================================
   Parser + balance checker
   ============================================================ */
function parse(formula) {
  let f = formula.replace(/\(([^)]+)\)(\d+)/g, (m, g, mult) =>
    g.replace(/([A-Z][a-z]*)(\d*)/g, (mm, el, c) => el + (parseInt(c || 1) * parseInt(mult))));
  const res = {};
  f.replace(/([A-Z][a-z]*)(\d*)/g, (m, el, c) => { res[el] = (res[el] || 0) + parseInt(c || 1); });
  return res;
}
function splitEq(eq) {
  const [l, r] = eq.split('->');
  return {
    reactants: l.split('+').map(s => s.trim()),
    products:  r.split('+').map(s => s.trim()),
  };
}
function isBalanced() {
  const problem = currentPool()[state.problemIdx];
  const { reactants, products } = splitEq(problem.eq);
  const left = {}, right = {};
  reactants.forEach((f, i) => {
    const p = parse(f);
    for (const el in p) left[el] = (left[el] || 0) + p[el] * state.coeffs[i];
  });
  products.forEach((f, i) => {
    const p = parse(f);
    const idx = i + reactants.length;
    for (const el in p) right[el] = (right[el] || 0) + p[el] * state.coeffs[idx];
  });
  const all = new Set([...Object.keys(left), ...Object.keys(right)]);
  for (const el of all) if ((left[el] || 0) !== (right[el] || 0)) return false;
  return true;
}

  const row = $('ladder');

    row.style.display = 'none';
    return;
  }
  row.style.display = 'flex';
  TIERS.forEach((t, i) => {
    let cls = 'tier-pill';
    if (i < state.progTier) cls += ' done';
    else if (i === state.progTier && state.mode === 'progressing') cls += ' now';
    if (state.mode === 'training' && i === state.trainTier) cls += ' drill';
    const pill = document.createElement('div');
    pill.className = cls;
    pill.innerHTML = `<span class="tier-idx">${t.label}</span><span class="tier-name">${t.name}</span>`;
    row.appendChild(pill);
  });
}

function renderStreak() {
  const wrap = $('streak');
  wrap.innerHTML = '';
  if (state.mode === 'sandbox' || state.mode === 'custom') {
    wrap.style.display = 'none';
    return;
  }
  wrap.style.display = 'flex';
  const inProg = state.mode === 'progressing';
  const total = inProg ? TIERS[state.progTier].toAdvance : TRAINING_TO_EXIT;
  const filled = inProg ? state.progWins : state.trainStreak;
  for (let i = 0; i < total; i++) {
    const d = document.createElement('span');
    d.className = 'streak-dot' + (i < filled ? ' filled' : i === filled ? ' active' : '');
    wrap.appendChild(d);
  }
}

function renderProblem() {
  const pool = currentPool();
  const problem = pool[state.problemIdx];
  const { reactants, products } = splitEq(problem.eq);
  state.coeffs = new Array(reactants.length + products.length).fill(1);

  const target = $('eq');
  target.innerHTML = '';

  const mkMol = (formula, idx) => {
    const wrap = document.createElement('div');
    wrap.className = 'mol';
    wrap.innerHTML = `
      <div class="step">
        <button class="step-btn" data-idx="${idx}" data-delta="1">▲</button>
        <span class="coeff" id="c-${idx}">1</span>
        <button class="step-btn" data-idx="${idx}" data-delta="-1">▼</button>
      </div>
      <span class="formula">${formula.replace(/(\d+)/g, '<sub>$1</sub>')}</span>
    `;
    return wrap;
  };

  reactants.forEach((m, i) => {
    target.appendChild(mkMol(m, i));
    if (i < reactants.length - 1) {
      const op = document.createElement('span'); op.className = 'op'; op.textContent = '+'; target.appendChild(op);
    }
  });
  const arrow = document.createElement('span'); arrow.className = 'op'; arrow.textContent = '→'; target.appendChild(arrow);
  products.forEach((m, i) => {
    const gi = i + reactants.length;
    target.appendChild(mkMol(m, gi));
    if (i < products.length - 1) {
      const op = document.createElement('span'); op.className = 'op'; op.textContent = '+'; target.appendChild(op);
    }
  });

  target.querySelectorAll('.step-btn').forEach(b => {
    b.addEventListener('click', () => {
      if (!state.started) return;
      const idx = parseInt(b.dataset.idx);
      const delta = parseInt(b.dataset.delta);
      state.coeffs[idx] = Math.max(1, Math.min(30, state.coeffs[idx] + delta));
      $(`c-${idx}`).textContent = state.coeffs[idx];
    });
  });

  // Gate the problem until the student taps Start
  state.started = false;
  stopTimer();
  target.classList.add('locked');
  $('start-box').classList.remove('hidden');
  $('actions').classList.remove('show');
  $('timer-row').classList.remove('show', 'urgent');
  $('timer-value').classList.remove('urgent');

  // Contextual Start copy (training + sandbox = no timer)
  if (state.mode === 'progressing') {
    $('start-sub').textContent = 'Tap to start. The 2-minute timer begins.';
  } else if (state.mode === 'training') {
    $('start-sub').textContent = 'No timer in training. Tap when ready.';
  } else {
    $('start-sub').textContent = 'Sandbox — no timer, no penalty.';
  }

  renderTopbar();
  renderLadder();
  renderStreak();
}

/* ============================================================
   Start + timer
   ============================================================ */
function onStart() {
  if (state.started) return;
  state.started = true;
  // Warm up speech synthesis on the first real user gesture — many
  // browsers silently block TTS until the page sees a click.
  primeSpeech();
  try {
    if (window.speechSynthesis) {
      const warm = new SpeechSynthesisUtterance('');
      warm.volume = 0;
      window.speechSynthesis.speak(warm);
    }
  } catch (e) {}
  $('eq').classList.remove('locked');
  $('start-box').classList.add('hidden');
  $('actions').classList.add('show');
  if (state.mode === 'progressing') startTimer();
}

function startTimer() {
  stopTimer();
  state.timeLeft = PROBLEM_TIME_LIMIT;
  renderTimer();
  $('timer-row').classList.add('show');
  state.timerId = setInterval(() => {
    state.timeLeft--;
    renderTimer();
    if (state.timeLeft <= 0) {
      stopTimer();
      onTimeout();
    }
  }, 1000);
  startWhispers();
}

function stopTimer() {
  if (state.timerId) { clearInterval(state.timerId); state.timerId = null; }
  $('timer-row').classList.remove('show', 'urgent');
  $('timer-value').classList.remove('urgent');
  stopWhispers();
}

/* ============================================================
   Whispers — taunts that fade in/out next to the timer to apply
   gentle pressure without being a full-screen distraction.
   ============================================================ */
const TAUNTS = [
  "you can't do it…",
  "tick. tock.",
  "give up?",
  "you're overthinking it.",
  "time's slipping.",
  "too hard for you?",
  "quit while you're ahead…",
  "this one's a trap.",
  "pay attention.",
  "you were wrong last time.",
  "keep guessing.",
  "why bother?",
  "almost… no.",
  "the clock is watching.",
  "you'll never make it.",
];
let whisperTimerId = null;
let whisperHideId = null;
function speakWhisper(text) {
  try {
    if (!window.speechSynthesis || !window.SpeechSynthesisUtterance) return;
    // Don't interrupt in-progress speech (e.g. a praise utterance).
    // If TTS is idle, whisper softly.
    if (window.speechSynthesis.speaking) return;
    const utter = new SpeechSynthesisUtterance(text);
    if (cachedVoice) utter.voice = cachedVoice;
    utter.rate = 0.82;       // slower — like a drawl
    utter.pitch = 0.65;      // lower pitch — hush
    utter.volume = 0.45;     // quieter than the praise
    window.speechSynthesis.speak(utter);
  } catch (e) {}
}
function startWhispers() {
  stopWhispers();
  let first = true;
  const loop = () => {
    // Fire the first taunt within 3-5s so students see it quickly,
    // then space them 8-14s apart.
    const delay = first ? (3000 + Math.random() * 2000) : (8000 + Math.random() * 6000);
    first = false;
    whisperTimerId = setTimeout(() => {
      const el = $('whisper');
      const pick = TAUNTS[Math.floor(Math.random() * TAUNTS.length)];
      el.textContent = pick;
      el.classList.add('show');
      speakWhisper(pick);
      whisperHideId = setTimeout(() => {
        el.classList.remove('show');
        loop();
      }, 2800);
    }, delay);
  };
  loop();
}
function stopWhispers() {
  if (whisperTimerId) { clearTimeout(whisperTimerId); whisperTimerId = null; }
  if (whisperHideId) { clearTimeout(whisperHideId); whisperHideId = null; }
  const el = $('whisper');
  if (el) { el.classList.remove('show'); el.textContent = ''; }
}

function renderTimer() {
  const m = Math.floor(state.timeLeft / 60);
  const s = state.timeLeft % 60;
  $('timer-value').textContent = `${m}:${String(s).padStart(2, '0')}`;
  if (state.timeLeft <= URGENT_TIME) {
    $('timer-row').classList.add('urgent');
    $('timer-value').classList.add('urgent');
  }
}

function onTimeout() {
  playTimeoutSound();
  toast('amber', `<b>Time's up.</b> Into training.`);
  enterTraining();
}

/* ============================================================
   Sound (Web Audio — no assets)
   ============================================================ */
let audioCtx = null;
function audio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

/* Praise: random '90s-Sacramento vibe line shown BIG on screen and
   (when possible) spoken out loud. The visible popup always fires —
   so even when TTS is blocked by browser/OS/school policy, students
   still get the hit of positive feedback.

   Speech synthesis quirks handled:
   - Voices load async on some browsers; we prime the list at boot
     and again on first user click.
   - Browsers block speech until a real user gesture — onStart() and
     onCheck() both count, so the first correct answer should speak.
   - If speak() silently fails, the visual is the fallback. */
const PRAISES = [
  "Awesome.",
  "Legit.",
  "That's baller.",
  "Heck yeah.",
  "I'm so stoked for you.",
  "So tight.",
  "You are my hero.",
  "I love it, but I wouldn't marry it.",
  "Sick.",
  "Killer.",
  "Rad.",
];
let speechReady = false;
let cachedVoice = null;
function primeSpeech() {
  if (!window.speechSynthesis) return;
  try {
    const voices = window.speechSynthesis.getVoices();
    // Target: chill Cali surfer vibe. Priority order, most-natural first:
    //  1) Premium / "enhanced" voices if the browser exposes them
    //  2) Newer macOS/iOS casual voices (Reed, Rocko, Aaron) that actually
    //     sound human-ish
    //  3) Older reliable-quality voices (Alex, Daniel)
    //  4) Google Chrome cloud voices (Google US English)
    //  5) Anything male en-US
    //  6) Any en voice
    const enhanced = voices.filter(v => /enhanced|premium|siri/i.test(v.name) && /^en/i.test(v.lang));
    if (enhanced.length) {
      // Prefer male-sounding within enhanced set
      cachedVoice = enhanced.find(v => /reed|rocko|aaron|alex|daniel|tom|fred/i.test(v.name))
                 || enhanced[0];
      speechReady = true; return;
    }
    const preferred = ['reed', 'rocko', 'aaron', 'alex', 'daniel', 'tom', 'fred', 'google us english', 'microsoft mark', 'microsoft david'];
    for (const want of preferred) {
      const v = voices.find(vv => vv.name.toLowerCase().includes(want));
      if (v) { cachedVoice = v; speechReady = true; return; }
    }
    cachedVoice = voices.find(v => /en-US/.test(v.lang))
               || voices.find(v => /^en/i.test(v.lang))
               || voices[0] || null;
    speechReady = voices.length > 0;
  } catch (e) {}
}
if (window.speechSynthesis) {
  primeSpeech();
  // Voices sometimes load after DOM ready — listen for the event too.
  window.speechSynthesis.addEventListener?.('voiceschanged', primeSpeech);
}

function showPraiseText(text) {
  const node = document.getElementById('praise');
  const span = document.getElementById('praise-text');
  span.textContent = text;
  node.classList.add('show');
  setTimeout(() => node.classList.remove('show'), 1400);
}

function playSuccessSound() {
  const text = PRAISES[Math.floor(Math.random() * PRAISES.length)];
  // Visual always fires
  showPraiseText(text);
  // Try speech on top
  try {
    if (!window.speechSynthesis || !window.SpeechSynthesisUtterance) return;
    window.speechSynthesis.cancel();
    const utter = new SpeechSynthesisUtterance(text);
    if (cachedVoice) utter.voice = cachedVoice;
    // Chill Cali surfer: slower drawl + lower pitch = laid-back, not cheery.
    utter.rate = 0.86;
    utter.pitch = 0.78;
    utter.volume = 1.0;
    window.speechSynthesis.speak(utter);
  } catch (e) {}
}

function playTimeoutSound() {
  try {
    const ac = audio(); const now = ac.currentTime;
    // Five harsh dissonant square-wave blasts — unmistakably annoying
    const notes = [247, 220, 196, 175, 165];
    notes.forEach((f, i) => {
      const t0 = now + i * 0.30;
      // two detuned oscillators for dissonance
      [0, 7].forEach(detune => {
        const osc = ac.createOscillator();
        osc.type = 'square'; osc.frequency.value = f; osc.detune.value = detune;
        const g = ac.createGain();
        g.gain.setValueAtTime(0, t0);
        g.gain.linearRampToValueAtTime(0.18, t0 + 0.015);
        g.gain.setValueAtTime(0.18, t0 + 0.22);
        g.gain.exponentialRampToValueAtTime(0.001, t0 + 0.29);
        osc.connect(g).connect(ac.destination);
        osc.start(t0); osc.stop(t0 + 0.30);
      });
    });
  } catch (e) {}
}

/* ============================================================
   Flow
   ============================================================ */
function toast(kind, html) {
  const t = $('toast');
  t.className = 'toast show ' + kind;
  t.innerHTML = html;
}
function clearToast() { $('toast').className = 'toast'; $('toast').innerHTML = ''; }

function onCheck() {
  if (!state.started) return;
  stopTimer();
  if (isBalanced()) onWin();
  else onMiss();
}

function onWin() {
  playSuccessSound();
  if (state.mode === 'custom') {
    toast('good', `<b>Balanced.</b>`);
    // Let praise play, then drop them back at the input form for the next reaction
    setTimeout(() => {
      state.customProblem = null;
      state.started = false;
      $('custom-input').value = '';
      renderCustomForm();
    }, 1600);
    return;
  }
  if (state.mode === 'sandbox') {
    toast('good', `<b>Balanced.</b>`);
    pickNext();
    renderProblem();
    return;
  }
  if (state.mode === 'progressing') {
    state.progWins++;
    const tier = TIERS[state.progTier];
    if (state.progWins >= tier.toAdvance) {
      if (state.progTier < TIERS.length - 1) {
        state.progTier++;
        state.progWins = 0;
        state.queues.prog[state.progTier] = shuffle(Array.from({length: TIERS[state.progTier].progressing.length}, (_, k) => k));
        toast('good', `<b>${TIERS[state.progTier].label}</b>`);
        pickNext();
      } else {
        // Boss cleared — unlock sandbox forever
        state.mastered = true;
        try { localStorage.setItem('bal-rxn-mastered', '1'); } catch (e) {}
        state.progWins = 0;
        refillQueue();
        toast('good', `<b>Mastered.</b> Sandbox unlocked.`);
        pickNext();
      }
    } else {
      toast('good', `<b>Balanced.</b>`);
      pickNext();
    }
    renderProblem();
    return;
  }
  // Training
  state.trainStreak++;
  if (state.trainStreak >= TRAINING_TO_EXIT) {
    state.mode = 'progressing';
    state.trainStreak = 0;
    state.progWins = 0;
    // Reshuffle AND push the failed problem to the back of the queue
    // so students don't get the exact same one the moment they return.
    reshuffleProgAvoidLast();
    toast('good', `<b>Back in.</b>`);
    pickNext();
  } else {
    toast('good', `<b>Balanced.</b>`);
    pickNext();
  }
  renderProblem();
}

function onMiss() {
  if (state.mode === 'custom') {
    playMildBuzz();
    toast('bad', `<b>Not balanced.</b> Keep adjusting.`);
    $('actions').classList.add('show');
    $('eq').classList.remove('locked');
    return;
  }
  if (state.mode === 'sandbox') {
    playMildBuzz();
    toast('bad', `<b>Not balanced.</b>`);
    $('actions').classList.add('show');
    $('eq').classList.remove('locked');
    return;
  }
  if (state.mode === 'progressing') {
    const current = currentPool()[state.problemIdx];
    state.lastFailedEq = current.eq;
    showCorrectAnswer(current, 3800);
    // Give the student a few seconds to read the balanced answer,
    // then drop into training. The showCorrectAnswer overlay blocks
    // the screen so there's no interaction possible mid-delay.
    setTimeout(() => enterTraining(), 3800);
    return;
  }
  // Training miss — reset streak, stay in training
  state.trainStreak = 0;
  toast('bad', `<b>Streak reset.</b>`);
  pickNext();
  renderProblem();
}

function enterTraining() {
  state.mode = 'training';
  state.trainTier = Math.max(0, state.progTier - 1);
  state.trainStreak = 0;
  state.progWins = 0;
  state.queues.train[state.trainTier] = shuffle(Array.from({length: TIERS[state.trainTier].training.length}, (_, k) => k));
  pickNext();
  renderProblem();
}

function onResetCoeffs() {
  if (!state.started) return;
  state.coeffs = state.coeffs.map(() => 1);
  state.coeffs.forEach((v, i) => { const el = $(`c-${i}`); if (el) el.textContent = v; });
}

function onStartOver() {
  if (state.mode === 'sandbox') {
    // From sandbox, the "Exit sandbox" button takes you back to progressing at Tier 3
    state.mode = 'progressing';
    state.progTier = TIERS.length - 1;
    state.progWins = 0;
    refillAll();
    pickNext();
    clearToast();
    renderProblem();
    return;
  }
  state.mode = 'progressing';
  state.progTier = 0;
  state.progWins = 0;
  state.trainTier = 0;
  state.trainStreak = 0;
  refillAll();
  pickNext();
  clearToast();
  renderProblem();
}

function onEnterSandbox() {
  state.mode = 'sandbox';
  state.queues.sand = shuffle(Array.from({length: SANDBOX.problems.length}, (_, k) => k));
  pickNext();
  clearToast();
  renderProblem();
}

/* ============================================================
   Practice (custom reaction) mode
   ============================================================ */
function parseCustomInput(raw) {
  let s = String(raw || '').trim();
  if (!s) return null;
  // Normalize arrows: →, ⟶, -->, =>, "yields", "->"  →  "->"
  s = s.replace(/→|⟶|⇾|=>/g, '->')
       .replace(/-->/g, '->')
       .replace(/\byields\b/gi, '->')
       .replace(/\bgives\b/gi, '->')
       .replace(/\bproduces\b/gi, '->');
  const parts = s.split('->').map(p => p.trim()).filter(Boolean);
  if (parts.length !== 2) return null;
  const splitSide = side => side
    .split(/\s*\+\s*/)
    .map(m => m.trim().replace(/^\d+\s*/, '')) // strip any leading coefficient
    .filter(Boolean);
  const reactants = splitSide(parts[0]);
  const products  = splitSide(parts[1]);
  if (!reactants.length || !products.length) return null;
  // Validate: each molecule starts with an uppercase letter and contains
  // only letters, digits, and parentheses
  const valid = /^[A-Z][A-Za-z0-9()]*$/;
  for (const m of [...reactants, ...products]) {
    if (!valid.test(m)) return null;
  }
  return {
    eq: reactants.join(' + ') + ' -> ' + products.join(' + '),
    name: 'Your reaction',
  };
}

function renderCustomForm() {
  document.body.dataset.mode = 'custom';
  $('main-card').style.display = 'none';
  $('ladder').style.display = 'none';
  $('streak').style.display = 'none';
  $('custom-form').style.display = 'block';
  $('custom-input').focus();
  $('custom-error').textContent = '';
  // Top bar tweaks for custom mode
  $('mode-badge').textContent = 'Practice';
  $('mode-icon').textContent = 'Free play';
  $('sandbox-btn').style.display = 'none';
  $('reset-btn').style.display = 'none';
}

function onPracticeClick() {
  state.mode = 'custom';
  state.customProblem = null;
  state.started = false;
  stopTimer();
  clearToast();
  renderCustomForm();
}

function onCustomBuild() {
  const raw = $('custom-input').value;
  const problem = parseCustomInput(raw);
  if (!problem) {
    $('custom-error').textContent = "Couldn't parse that. Try something like: H2 + O2 → H2O";
    return;
  }
  state.customProblem = problem;
  state.started = false;
  // Switch to the main card with the built equation
  $('custom-form').style.display = 'none';
  $('main-card').style.display = '';
  renderProblem();
}

function onCustomExit() {
  // Leave practice and return to progressing where they were
  state.mode = 'progressing';
  state.customProblem = null;
  state.started = false;
  $('custom-form').style.display = 'none';
  $('main-card').style.display = '';
  $('reset-btn').style.display = '';
  stopTimer();
  clearToast();
  refillAll();
  pickNext();
  renderProblem();
}

function playMildBuzz() {
  try {
    const ac = audio(); const now = ac.currentTime;
    const osc = ac.createOscillator(); osc.type = 'square'; osc.frequency.value = 180;
    const g = ac.createGain();
    g.gain.setValueAtTime(0, now);
    g.gain.linearRampToValueAtTime(0.18, now + 0.01);
    g.gain.setValueAtTime(0.18, now + 0.14);
    g.gain.exponentialRampToValueAtTime(0.001, now + 0.22);
    osc.connect(g).connect(ac.destination);
    osc.start(now); osc.stop(now + 0.24);
  } catch (e) {}
}

/* Wire */
$('check-btn').addEventListener('click', onCheck);
$('reset-coeffs-btn').addEventListener('click', onResetCoeffs);
$('reset-btn').addEventListener('click', onStartOver);
$('start-btn').addEventListener('click', onStart);
$('sandbox-btn').addEventListener('click', onEnterSandbox);
$('practice-btn').addEventListener('click', onPracticeClick);
$('custom-build-btn').addEventListener('click', onCustomBuild);
$('custom-exit-btn').addEventListener('click', onCustomExit);
$('custom-input').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') { e.preventDefault(); onCustomBuild(); }
});

/* Boot */
refillAll();
pickNext();
renderProblem();
</script>
